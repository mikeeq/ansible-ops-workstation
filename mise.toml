[tools]
# Custom registries are not included in mise-versions
# https://mise-versions.jdx.dev/

# mise registry | grep -i aws
# mise plugins ls-remote | grep aws
# mise ls-remote aws-cli

python = "3.14"
pipx = "latest"
# "pipx:ansible" = { version = "latest", postinstall = "pipx inject ansible passlib" }
"pipx:ansible" = "latest"

## Security scanning

# https://github.com/aquasecurity/trivy/releases
trivy = "v0.69.3"

# https://github.com/gitleaks/gitleaks/releases
gitleaks = "8.30.1"

## Pre-commit and linting

# https://github.com/pre-commit/pre-commit/releases
pre-commit = "latest"

[env]
# pipx:ansible only shims ansible-community; expose the full ansible venv bin dir
# exec falls back to /dev/null when ansible is not yet installed (harmless)
#_.path = { path = ["{{ tools['pipx:ansible'].path }}/venvs/ansible/bin"], tools = true }
_.path = { path = ["{{ exec(command='mise where pipx:ansible 2>/dev/null || echo /dev/null') }}/venvs/ansible/bin"], tools = true }

[tasks.pre-commit]
description = "Run pre-commit checks on all files"
run = "pre-commit run --all-files --show-diff-on-failure --color=always"

[tasks.ansible-setup]
description = "Inject passlib into ansible pipx environment"
run = "pipx inject ansible passlib"
