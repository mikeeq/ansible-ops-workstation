---
- name: Install GitHub CLI via Homebrew (macOS)
  community.general.homebrew:
    name: gh
    state: present
  when: ansible_os_family == "Darwin"

- name: Add GitHub CLI repo (Fedora/RHEL)
  ansible.builtin.command: dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
  args:
    creates: /etc/yum.repos.d/gh-cli.repo
  when: ansible_os_family == "RedHat"

- name: Add GitHub CLI GPG key (Debian/Ubuntu)
  ansible.builtin.shell: |
    curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
    chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/githubcli-archive-keyring.gpg
  when: ansible_os_family == "Debian"

- name: Add GitHub CLI repo (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }} signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
    filename: github-cli
    state: present
  when: ansible_os_family == "Debian"

- name: Install GitHub CLI via package manager (Linux)
  ansible.builtin.package:
    name: gh
    state: present
  when: ansible_os_family != "Darwin"
