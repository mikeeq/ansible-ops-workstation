---
- name: antidote deps
  ansible.builtin.package:
    name: "{{ pkgs }}"
    state: present
  vars:
    pkgs:
      - zsh
      - curl
      - git
      - fzf

- name: "Change user default shell to zsh"
  ansible.builtin.user:
    name: "{{ item }}"
    shell: /bin/zsh
  with_items: "{{ antidote_users }}"

- ansible.builtin.import_tasks: starship.yaml
- ansible.builtin.import_tasks: plugins.yaml
- ansible.builtin.import_tasks: work.yaml

- ansible.builtin.import_tasks: update.yaml
  tags:
    - update
