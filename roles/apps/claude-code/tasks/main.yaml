---
# - name: Set Claude Code package name
#   ansible.builtin.set_fact:
#     claude_code_package: "@anthropic-ai/claude-code{{ ('@' ~ claude_code_npm_version) if claude_code_npm_version is defined else '' }}"

- name: Install Claude Code via installer script
  become: true
  become_user: "{{ user_name }}"
  ansible.builtin.shell: curl -fsSL https://claude.ai/install.sh | bash -s -- stable
  args:
    executable: /bin/bash
    creates: "~{{ user_name }}/.local/bin/claude"

- name: Ensure Claude Code configuration directory exists
  ansible.builtin.file:
    path: "/home/{{ user_name }}/.claude"
    state: directory

# https://unsloth.ai/docs/basics/claude-code
- name: Deploy Claude Code configuration
  ansible.builtin.template:
    src: settings.json.j2
    dest: "/home/{{ user_name }}/.claude/settings.json"
    mode: "0644"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"

