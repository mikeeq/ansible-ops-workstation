---
- name: Add Visual Studio Code rpm repo gpg key
  ansible.builtin.rpm_key:
    state: present
    key: https://packages.microsoft.com/keys/microsoft.asc

- name: Add Visual Studio code repository to yum/dnf
  ansible.builtin.copy:
    src: vscode.repo
    dest: /etc/yum.repos.d/vscode.repo
    owner: root
    group: root
    mode: "0600"

- name: Install VCS
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
    - code
    - code-insiders

- name: List installed extensions
  become: true
  become_user: "{{ user_name }}"
  ansible.builtin.shell: code-insiders --list-extensions
  register: installed_insiders_extensions
  changed_when: false


- name: Install extensions
  become: true
  become_user: "{{ user_name }}"
  ansible.builtin.shell: code-insiders --install-extension {{ item }}
  when: item not in installed_insiders_extensions.stdout_lines
  with_items:
    - "{{ vscode_extensions }}"
