---
# This is a basic workflow to help you get started with Actions
name: CI
# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
      # - feature/*
  pull_request:
    branches:
      - main
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  static-analysis:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      - name: Install pre-commit and ansible
        run: sudo pipx install --global pre-commit
      - name: Install pre-commit hooks
        run: pre-commit install --install-hooks
      - name: Install ansible-galaxy requirements
        run: ansible-galaxy install -r requirements.yaml --force
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color=always
  # This workflow contains a single job called "build"
  build-fedora:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      - name: Runner storage cleanup
        run: sudo ./.github/cleanup-runner.sh
      - name: Build fedora-systemd image...
        run: docker build -t fedora_systemd:latest .
      - name: Run Ansible in Docker...
        run: scripts/run_ansible_in_docker.sh
  build-fedora-arm64:
    # The type of runner that the job will run on
    runs-on: ubuntu-24.04-arm

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      - name: Runner storage cleanup
        run: sudo ./.github/cleanup-runner.sh
      - name: Build fedora-systemd image...
        run: docker build -t fedora_systemd:latest .
      - name: Run Ansible in Docker...
        run: scripts/run_ansible_in_docker.sh
  build-ubuntu:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      - name: Runner storage cleanup
        run: sudo ./.github/cleanup-runner.sh
      - name: Build ubuntu image...
        run: docker build -f Dockerfile-ubuntu -t ubuntu-aow:latest .
      - name: Run Ansible in Docker...
        run: ANSIBLE_PLAYBOOK=wsl-ubuntu.yaml DOCKER_IMAGE=ubuntu-aow scripts/run_ansible_in_docker.sh

      # - name: "YamlLint"
      #   run: |
      #     docker run --rm -v $(pwd):/repo -t alpine:latest /bin/sh -c '
      #       cd /repo
      #       apk add --no-cache python3
      #       pip3 install yamllint
      #       yamllint .
      #     '
      # - name: "ShellCheck"
      #   run: |
      #     docker run --rm -v $(pwd):/repo -t alpine:latest /bin/sh -c '
      #       cd /repo
      #       apk add --no-cache shellcheck bash
      #       shellcheck ./*.sh
      #     '

  build-macos:
    # The type of runner that the job will run on
    runs-on: macos-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2

      - name: Create mikee user
        run: sudo sysadminctl -addUser mikee -password mikee -admin

      - name: Give mikee ownership of workspace
        run: |
          sudo chown -R mikee:staff "$GITHUB_WORKSPACE"
          sudo chown -R mikee:staff /opt/homebrew /opt/homebrew/etc/bash_completion.d /opt/homebrew/lib/pkgconfig /opt/homebrew/share/aclocal /opt/homebrew/share/doc /opt/homebrew/share/info /opt/homebrew/share/locale /opt/homebrew/share/man /opt/homebrew/share/man/man1 /opt/homebrew/share/man/man3 /opt/homebrew/share/man/man5 /opt/homebrew/share/man/man7 /opt/homebrew/share/man/man8 /opt/homebrew/share/zsh /opt/homebrew/share/zsh/site-functions /opt/homebrew/var/homebrew/locks /opt/homebrew/var/log

      - name: Install mise as mikee
        run: |
          sudo -u mikee -i bash -c 'curl https://mise.run | sh'
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Setup mise as mikee
        run: |
          cat > /tmp/setup-mise.sh << 'EOF'
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/bin:$HOME/.local/share/mise/shims:$PATH"
          cd "$WORKSPACE_DIR"
          mise trust
          mise install
          EOF
          sudo -u mikee WORKSPACE_DIR="${{ github.workspace }}" GITHUB_TOKEN="${GITHUB_TOKEN}" -i bash /tmp/setup-mise.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run Ansible
        run: |
          cat > /tmp/run-ansible.sh << 'EOF'
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/bin:$HOME/.local/share/mise/shims:$PATH"
          cd "$WORKSPACE_DIR/playbooks"
          mise exec -- ansible-playbook -i ../inventory/hosts.yaml mac.yaml
          EOF
          sudo -u mikee WORKSPACE_DIR="${{ github.workspace }}" -i bash /tmp/run-ansible.sh
